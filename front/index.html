<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elasticsearch 搜索前端</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
        }
        form {
            margin-bottom: 20px;
        }
        input, select {
            padding: 10px;
            margin: 5px 0;
            width: 100%;
            box-sizing: border-box;
        }
        button {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        #results {
            margin-top: 20px;
        }
        .result-item {
            padding: 10px;
            border-bottom: 1px solid #eee;
        }
        .result-item:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Elasticsearch 搜索</h1>
        <form id="search-form">
            <div>
                <label for="index">索引名:</label>
                <input type="text" id="index" name="index" required>
            </div>
            <div>
                <label for="query">搜索关键词:</label>
                <input type="text" id="query" name="q" required>
            </div>
            <div>
                <label for="fields">搜索字段 (逗号分隔):</label>
                <input type="text" id="fields" name="fields" placeholder="name,description">
            </div>
            <div>
                <label for="page">页码:</label>
                <input type="number" id="page" name="page" value="1" min="1">
            </div>
            <div>
                <label for="size">每页大小:</label>
                <input type="number" id="size" name="size" value="10" min="1" max="100">
            </div>
            <button type="submit">搜索</button>
        </form>
        <div id="results">
            <!-- 搜索结果将显示在这里 -->
        </div>
    </div>

    <script>
        document.getElementById('search-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const params = new URLSearchParams();
            
            formData.forEach((value, key) => {
                if (value) {
                    params.append(key, value);
                }
            });
            
            const url = `/api/search?${params.toString()}`;
            
            fetch(url)
                .then(response => response.json())
                .then(data => {
                    const resultsDiv = document.getElementById('results');
                    resultsDiv.innerHTML = '';
                    
                    if (data.hits && data.hits.total && data.hits.total.value > 0) {
                        resultsDiv.innerHTML = `<h2>找到 ${data.hits.total.value} 条结果</h2>`;
                        
                        data.hits.hits.forEach((hit, index) => {
                            const resultItem = document.createElement('div');
                            resultItem.className = 'result-item';
                            resultItem.innerHTML = `
                                <h3>结果 ${index + 1}</h3>
                                <pre>${JSON.stringify(JSON.parse(hit._source), null, 2)}</pre>
                            `;
                            resultsDiv.appendChild(resultItem);
                        });
                    } else {
                        resultsDiv.innerHTML = '<h2>没有找到结果</h2>';
                    }
                })
                .catch(error => {
                    console.error('搜索错误:', error);
                    document.getElementById('results').innerHTML = '<h2>搜索出错，请重试</h2>';
                });
        });
    </script>
</body>
</html>
